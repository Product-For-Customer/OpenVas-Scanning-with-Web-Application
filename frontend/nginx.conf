server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # ── Security headers ────────────────────────────────────────────────────
  # `always` makes them apply to error responses too. These are the
  # zero-breakage hardening headers:
  #   - X-Frame-Options / CSP frame-ancestors: block clickjacking (this app
  #     is never meant to be embedded in a foreign <iframe>).
  #   - X-Content-Type-Options: stop MIME-sniffing of responses.
  #   - Referrer-Policy: don't leak full URLs (which can carry IDs/tokens)
  #     to third-party sites.
  #   - Permissions-Policy: proactively deny powerful device APIs the app
  #     doesn't use.
  # NOTE: nginx `add_header` does NOT inherit into a location block that
  # declares its own add_header, so these are repeated in the asset block
  # below. A full resource-restricting CSP (script-src/connect-src/…) is left
  # out on purpose — it needs per-deployment tuning of the backend origin and
  # was not added blindly to avoid breaking API/asset loading.
  add_header X-Frame-Options "DENY" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
  add_header Content-Security-Policy "frame-ancestors 'none'; base-uri 'self'; object-src 'none'" always;

  location / {
    try_files $uri $uri/ /index.html;
  }

  location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
    try_files $uri =404;
    expires 7d;
    add_header Cache-Control "public, max-age=604800";
    # Re-declared because the add_header above is not inherited here.
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy "frame-ancestors 'none'; base-uri 'self'; object-src 'none'" always;
  }
}