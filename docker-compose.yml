name: greenbone-community-edition

services:
  vulnerability-tests:
    image: registry.community.greenbone.net/community/vulnerability-tests
    environment:
      FEED_RELEASE: "24.10"
      KEEP_ALIVE: 1
    volumes:
      - vt_data_vol:/mnt
    restart: on-failure
    healthcheck:
      test: ["CMD-SHELL", "test -d /mnt && test -n \"$(find /mnt -type f 2>/dev/null | head -n 1)\""]
      interval: 30s
      timeout: 15s
      retries: 20
      start_period: 15m

  notus-data:
    image: registry.community.greenbone.net/community/notus-data
    environment:
      KEEP_ALIVE: 1
    volumes:
      - notus_data_vol:/mnt
    restart: on-failure
    healthcheck:
      test: ["CMD-SHELL", "test -d /mnt && test -n \"$(find /mnt -type f 2>/dev/null | head -n 1)\""]
      interval: 30s
      timeout: 15s
      retries: 20
      start_period: 15m

  scap-data:
    image: registry.community.greenbone.net/community/scap-data
    environment:
      KEEP_ALIVE: 1
    volumes:
      - scap_data_vol:/mnt
    restart: on-failure
    healthcheck:
      test: ["CMD-SHELL", "test -d /mnt && test -n \"$(find /mnt -type f 2>/dev/null | head -n 1)\""]
      interval: 30s
      timeout: 15s
      retries: 30
      start_period: 20m

  cert-bund-data:
    image: registry.community.greenbone.net/community/cert-bund-data
    environment:
      KEEP_ALIVE: 1
    volumes:
      - cert_data_vol:/mnt
    restart: on-failure
    healthcheck:
      test: ["CMD-SHELL", "test -d /mnt && test -n \"$(find /mnt -type f 2>/dev/null | head -n 1)\""]
      interval: 30s
      timeout: 15s
      retries: 20
      start_period: 15m

  dfn-cert-data:
    image: registry.community.greenbone.net/community/dfn-cert-data
    environment:
      KEEP_ALIVE: 1
    volumes:
      - cert_data_vol:/mnt
    restart: on-failure
    depends_on:
      cert-bund-data:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "test -d /mnt && test -n \"$(find /mnt -type f 2>/dev/null | head -n 1)\""]
      interval: 30s
      timeout: 15s
      retries: 20
      start_period: 15m

  data-objects:
    image: registry.community.greenbone.net/community/data-objects
    environment:
      FEED_RELEASE: "24.10"
      KEEP_ALIVE: 1
    volumes:
      - data_objects_vol:/mnt
    restart: on-failure
    healthcheck:
      test: ["CMD-SHELL", "test -d /mnt && test -n \"$(find /mnt -type f 2>/dev/null | head -n 1)\""]
      interval: 30s
      timeout: 15s
      retries: 20
      start_period: 15m

  report-formats:
    image: registry.community.greenbone.net/community/report-formats
    environment:
      FEED_RELEASE: "24.10"
      KEEP_ALIVE: 1
    volumes:
      - data_objects_vol:/mnt
    restart: on-failure
    depends_on:
      data-objects:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "test -d /mnt && test -n \"$(find /mnt -type f 2>/dev/null | head -n 1)\""]
      interval: 30s
      timeout: 15s
      retries: 20
      start_period: 15m

  gpg-data:
    image: registry.community.greenbone.net/community/gpg-data
    volumes:
      - gpg_data_vol:/mnt
    restart: on-failure

  redis-server:
    image: registry.community.greenbone.net/community/redis-server
    restart: on-failure
    volumes:
      - redis_socket_vol:/run/redis/

  pg-gvm:
    image: registry.community.greenbone.net/community/pg-gvm:stable
    restart: on-failure:10
    ports:
      - "15432:5432"
    volumes:
      - psql_data_vol:/var/lib/postgresql
      - psql_socket_vol:/var/run/postgresql
    depends_on:
      pg-gvm-migrator:
        condition: service_completed_successfully

  pg-gvm-migrator:
    image: registry.community.greenbone.net/community/pg-gvm-migrator:stable
    restart: "no"
    volumes:
      - psql_data_vol:/var/lib/postgresql
      - psql_socket_vol:/var/run/postgresql

  gvmd:
    image: registry.community.greenbone.net/community/gvmd:stable
    restart: on-failure
    volumes:
      - gvmd_data_vol:/var/lib/gvm
      - scap_data_vol:/var/lib/gvm/scap-data/
      - cert_data_vol:/var/lib/gvm/cert-data
      - data_objects_vol:/var/lib/gvm/data-objects/gvmd
      - vt_data_vol:/var/lib/openvas/plugins
      - psql_data_vol:/var/lib/postgresql
      - gvmd_socket_vol:/run/gvmd
      - ospd_openvas_socket_vol:/run/ospd
      - psql_socket_vol:/var/run/postgresql
    depends_on:
      pg-gvm:
        condition: service_started
      scap-data:
        condition: service_healthy
      cert-bund-data:
        condition: service_healthy
      dfn-cert-data:
        condition: service_healthy
      data-objects:
        condition: service_healthy
      report-formats:
        condition: service_healthy

  gsa:
    image: registry.community.greenbone.net/community/gsa:stable
    restart: on-failure
    ports:
      - "9392:9392"
    volumes:
      - gvmd_socket_vol:/run/gvmd
    depends_on:
      gvmd:
        condition: service_started
    entrypoint:
      - /bin/sh
      - -c
    command:
      - exec gsad --foreground --http-only --no-redirect --listen=0.0.0.0 --port=9392 --munix-socket=/run/gvmd/gvmd.sock

  configure-openvas:
    image: registry.community.greenbone.net/community/openvas-scanner:stable
    volumes:
      - openvas_data_vol:/mnt
      - openvas_log_data_vol:/var/log/openvas
    command:
      - /bin/sh
      - -c
      - |
        printf "table_driven_lsc = yes\nopenvasd_server = http://openvasd:80\n" > /mnt/openvas.conf
        sed "s/127/128/" /etc/openvas/openvas_log.conf | sed 's/gvm/openvas/' > /mnt/openvas_log.conf
        chmod 644 /mnt/openvas.conf
        chmod 644 /mnt/openvas_log.conf
        touch /var/log/openvas/openvas.log
        chmod 666 /var/log/openvas/openvas.log

  openvas:
    image: registry.community.greenbone.net/community/openvas-scanner:stable
    restart: on-failure
    volumes:
      - openvas_data_vol:/etc/openvas
      - openvas_log_data_vol:/var/log/openvas
    command:
      - /bin/sh
      - -c
      - |
        cat /etc/openvas/openvas.conf
        tail -f /var/log/openvas/openvas.log
    depends_on:
      configure-openvas:
        condition: service_completed_successfully

  openvasd:
    image: registry.community.greenbone.net/community/openvas-scanner:stable
    restart: on-failure
    environment:
      OPENVASD_MODE: service_notus
      GNUPGHOME: /etc/openvas/gnupg
      LISTENING: 0.0.0.0:80
    volumes:
      - openvas_data_vol:/etc/openvas
      - openvas_log_data_vol:/var/log/openvas
      - gpg_data_vol:/etc/openvas/gnupg
      - notus_data_vol:/var/lib/notus
    depends_on:
      vulnerability-tests:
        condition: service_healthy
      notus-data:
        condition: service_healthy
      configure-openvas:
        condition: service_completed_successfully
      gpg-data:
        condition: service_completed_successfully
    networks:
      default:
        aliases:
          - openvasd

  ospd-openvas:
    image: registry.community.greenbone.net/community/ospd-openvas:stable
    restart: on-failure
    hostname: ospd-openvas.local
    cap_add:
      - NET_ADMIN
      - NET_RAW
    security_opt:
      - seccomp=unconfined
      - apparmor=unconfined
    command:
      [
        "ospd-openvas",
        "-f",
        "--config",
        "/etc/gvm/ospd-openvas.conf",
        "--notus-feed-dir",
        "/var/lib/notus/advisories",
        "-m",
        "666",
      ]
    volumes:
      - gpg_data_vol:/etc/openvas/gnupg
      - vt_data_vol:/var/lib/openvas/plugins
      - notus_data_vol:/var/lib/notus
      - ospd_openvas_socket_vol:/run/ospd
      - redis_socket_vol:/run/redis/
      - openvas_data_vol:/etc/openvas/
      - openvas_log_data_vol:/var/log/openvas
    depends_on:
      redis-server:
        condition: service_started
      gpg-data:
        condition: service_completed_successfully
      configure-openvas:
        condition: service_completed_successfully
      vulnerability-tests:
        condition: service_healthy
      notus-data:
        condition: service_healthy

  gvm-tools:
    image: registry.community.greenbone.net/community/gvm-tools
    volumes:
      - gvmd_socket_vol:/run/gvmd
      - ospd_openvas_socket_vol:/run/ospd
    depends_on:
      - gvmd
      - ospd-openvas

  db-init:
    image: registry.community.greenbone.net/community/pg-gvm:stable
    depends_on:
      - pg-gvm
    volumes:
      - psql_socket_vol:/var/run/postgresql
      - ./db.sql:/init.sql:ro
    command: >
      sh -c "
      sleep 45 &&
      psql -h /var/run/postgresql -U postgres -d gvmd -f /init.sql
      "
    restart: "no"
    
  zap:
    image: zaproxy/zap-stable
    container_name: zap
    restart: unless-stopped
    command: >
      zap.sh -daemon -host 0.0.0.0 -port 8080
      -config api.disablekey=false
      -config api.key=${ZAP_API_KEY}
      -config api.addrs.addr.name=.*
      -config api.addrs.addr.regex=true

  # docker-socket-proxy sits between the backend and the real Docker socket.
  # The backend needs Docker to (a) run throwaway Nmap containers for network
  # discovery and (b) pull feed images / `docker compose up` for feed updates.
  # Previously it got that by bind-mounting /var/run/docker.sock directly —
  # which meant any RCE in the backend was instant host root (the socket is
  # root-equivalent). Now only this tiny haproxy-based proxy holds the raw
  # socket (read-only), and it exposes a filtered TCP API on the internal
  # network that ALLOWS just the endpoints the two scripts use and DENIES the
  # rest (exec, secrets, swarm, build, …). The proxy has no app code and is
  # not published to the host.
  #
  # Residual limitation (documented, not solved here): container-create must
  # stay allowed for Nmap/compose, so an attacker with backend RCE could still
  # craft a container with a host bind-mount to escape. Fully closing that
  # needs a dedicated, separately-sandboxed scan-runner service — a larger
  # refactor. This change still removes the raw socket from the app container
  # and blocks the exec/secrets/swarm/build vectors entirely.
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:latest  # tiny (~5MB) haproxy; pin to a digest for production
    container_name: docker-socket-proxy
    restart: unless-stopped
    # Defense-in-depth: this container brokers Docker access, so forbid it from
    # ever gaining new privileges via setuid binaries.
    security_opt:
      - no-new-privileges:true
    environment:
      # --- Allowed: exactly what discovery-scan.sh + update-feed.sh need ---
      - POST=1           # required — create/start/pull/restart are POST requests
      - CONTAINERS=1     # `docker run` (Nmap) + compose create/start
      - IMAGES=1         # `docker pull` feed images + image inspect
      - NETWORKS=1       # compose networks
      - VOLUMES=1        # compose named volumes
      - INFO=1           # scripts call `docker info` as a readiness probe
      - VERSION=1        # CLI/compose API-version negotiation
      - PING=1
      - ALLOW_RESTARTS=1 # compose restart gvmd/ospd-openvas/openvasd/openvas
      # --- Denied: dangerous and unused by this app (0 = blocked) ---
      - EXEC=0           # no `docker exec` into the running privileged scanner containers
      - AUTH=0
      - SECRETS=0
      - CONFIGS=0
      - SERVICES=0
      - TASKS=0
      - SWARM=0
      - NODES=0
      - PLUGINS=0
      - SYSTEM=0
      - BUILD=0
      - COMMIT=0
      - DISTRIBUTION=0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  backend:
    build: ./backend
    container_name: backend
    restart: unless-stopped
    # The backend holds brokered Docker access, so lock down privilege
    # escalation inside it. Safe with the bundled Chromium: report PDF capture
    # runs it with --no-sandbox/--disable-setuid-sandbox (see report/pdf.go), so
    # nothing here relies on gaining privileges through a setuid binary.
    security_opt:
      - no-new-privileges:true
    ports:
      - "9000:9000"
    volumes:
      # NOTE: the raw docker.sock bind-mount was removed — the backend now
      # reaches Docker only through docker-socket-proxy (see DOCKER_HOST below).
      - ./backend/scripts:/app/scripts:ro
      - .:/workspace:ro
      - ./backend/tmp/reports:/app/tmp/reports
      - gvmd_socket_vol:/run/gvmd
    environment:
      - PORT=${PORT}
      - PATH_API_URL=${PATH_API_URL}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - JWT_SECRET=${JWT_SECRET}
      - AUTOMATION_TOKEN=${AUTOMATION_TOKEN}
      - ZAP_API_URL=http://zap:8080
      - ZAP_API_KEY=${ZAP_API_KEY}
      # Route every `docker` / `docker compose` call through the filtered proxy
      # instead of a locally-mounted socket.
      - DOCKER_HOST=tcp://docker-socket-proxy:2375
    depends_on:
      - pg-gvm
      - zap
      - docker-socket-proxy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_BACKEND_URL: ${VITE_BACKEND_URL}
        VITE_OPENVAS_URL: ${VITE_OPENVAS_URL}
    container_name: frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  gpg_data_vol:
  scap_data_vol:
  cert_data_vol:
  data_objects_vol:
  gvmd_data_vol:
  psql_data_vol:
  vt_data_vol:
  notus_data_vol:
  psql_socket_vol:
  gvmd_socket_vol:
  ospd_openvas_socket_vol:
  redis_socket_vol:
  openvas_data_vol:
  openvas_log_data_vol: