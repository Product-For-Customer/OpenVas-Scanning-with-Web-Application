name: Weekly dependency security scan

on:
  schedule:
    # Every Monday 03:00 UTC
    - cron: "0 3 * * 1"
  workflow_dispatch: {}

jobs:
  govulncheck:
    name: govulncheck (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"
          cache-dependency-path: backend/go.sum

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      # Informational only (continue-on-error): this is a weekly report, not
      # a merge gate — a new advisory shouldn't block unrelated same-day PRs.
      # Check the run's summary/logs to see what it found.
      - name: Run govulncheck
        continue-on-error: true
        run: govulncheck ./...

  npm-audit:
    name: npm audit (frontend)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Informational only, same reasoning as govulncheck above.
      - name: Run npm audit
        continue-on-error: true
        run: npm audit --audit-level=high
